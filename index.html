<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content" />
    <title>Projeto Hail Mary AR</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <main class="hud" aria-live="polite">
      <section class="brand">
        <p class="kicker">Missao WebAR</p>
        <h1>Projeto Hail Mary</h1>
      </section>

      <section class="panel">
        <span id="marker-status" class="status">Procurando marcador</span>
        <span id="mode-status" class="mode-status">Fase 1</span>
        <span id="mission-status" class="mission-status">Sol em queda</span>
        <button id="evolve-button" class="evolve-button" type="button" disabled>
          Avancar
        </button>
        <a class="marker-link" href="https://ar-js-org.github.io/AR.js/data/images/hiro.png" target="_blank" rel="noreferrer">
          Marcador Hiro
        </a>
      </section>
    </main>

    <button id="sound-toggle" class="sound-toggle" type="button" aria-label="Ativar som">
      Som
    </button>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true; colorManagement: true"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; sourceWidth: 640; sourceHeight: 480; displayWidth: 640; displayHeight: 480;"
    >
      <a-assets>
        <a-mixin
          id="seed"
          geometry="primitive: octahedron; radius: 0.08"
          material="metalness: 0.2; roughness: 0.35"
          animation="property: rotation; to: 360 180 0; dur: 3200; loop: true; easing: linear"
        ></a-mixin>
        <a-mixin
          id="petal"
          geometry="primitive: cone; radiusBottom: 0.08; radiusTop: 0.012; height: 0.38; segmentsRadial: 5"
          material="metalness: 0.12; roughness: 0.3; transparent: true; opacity: 0.86"
        ></a-mixin>
        <a-mixin
          id="beam"
          geometry="primitive: cylinder; radius: 0.008; height: 1.08; segmentsRadial: 8"
          material="transparent: true; opacity: 0.34; roughness: 0.2"
        ></a-mixin>
      </a-assets>

      <a-marker id="hiro-marker" preset="hiro" emitevents="true">
        <a-entity id="garden" position="0 0 0" rotation="-90 0 0" scale="1 1 1">
          <a-entity light="type: ambient; intensity: 0.72; color: #dffdf5"></a-entity>
          <a-entity id="core-light" light="type: point; intensity: 1.6; distance: 2.4; color: #79ffe1" position="0 0.7 0"></a-entity>

          <a-entity
            id="core-hit-area"
            class="interactive"
            geometry="primitive: sphere; radius: 0.58"
            material="transparent: true; opacity: 0; depthWrite: false"
            position="0 0.42 0"
          ></a-entity>

          <a-entity
            id="core"
            class="interactive"
            geometry="primitive: icosahedron; radius: 0.32; detail: 2"
            material="color: #2ef2c2; metalness: 0.35; roughness: 0.18; emissive: #0c6b58; emissiveIntensity: 0.25"
            position="0 0.42 0"
            animation="property: rotation; to: 0 360 0; dur: 5400; loop: true; easing: linear"
            animation__pulse="property: scale; from: 1 1 1; to: 1.14 1.14 1.14; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine"
          ></a-entity>

          <a-entity
            id="inner-crystal"
            geometry="primitive: octahedron; radius: 0.18"
            position="0 0.88 0"
            material="color: #ffffff; emissive: #79ffe1; emissiveIntensity: 0.6; metalness: 0.2; roughness: 0.12"
            animation="property: rotation; to: 360 0 360; dur: 4800; loop: true; easing: linear"
            animation__float="property: position; from: 0 0.78 0; to: 0 1.02 0; dur: 1900; dir: alternate; loop: true; easing: easeInOutSine"
          ></a-entity>

          <a-entity
            id="hail-mary-ship"
            position="0 1.22 0"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; dur: 16800; loop: true; easing: linear"
          >
            <a-cylinder
              id="ship-body"
              radius="0.055"
              height="0.42"
              rotation="90 0 0"
              material="color: #d9eef7; metalness: 0.65; roughness: 0.22"
            ></a-cylinder>
            <a-cone
              id="ship-nose"
              radius-bottom="0.058"
              radius-top="0"
              height="0.13"
              position="0 0 -0.28"
              rotation="90 0 0"
              material="color: #ffffff; metalness: 0.5; roughness: 0.18"
            ></a-cone>
            <a-cylinder
              id="ship-engine"
              radius="0.044"
              height="0.08"
              position="0 0 0.25"
              rotation="90 0 0"
              material="color: #101923; emissive: #ff8a1f; emissiveIntensity: 0.9; metalness: 0.4; roughness: 0.25"
            ></a-cylinder>
            <a-box
              class="ship-panel"
              width="0.04"
              height="0.012"
              depth="0.5"
              position="0.22 0 0"
              material="color: #1e40af; emissive: #38bdf8; emissiveIntensity: 0.24; metalness: 0.15; roughness: 0.28"
            ></a-box>
            <a-box
              class="ship-panel"
              width="0.04"
              height="0.012"
              depth="0.5"
              position="-0.22 0 0"
              material="color: #1e40af; emissive: #38bdf8; emissiveIntensity: 0.24; metalness: 0.15; roughness: 0.28"
            ></a-box>
            <a-cylinder
              class="ship-antenna"
              radius="0.006"
              height="0.38"
              position="0 0.12 -0.02"
              rotation="0 0 90"
              material="color: #dbeafe; emissive: #60a5fa; emissiveIntensity: 0.26"
            ></a-cylinder>
          </a-entity>

          <a-torus
            id="ring-a"
            color="#ffbf47"
            radius="0.56"
            radius-tubular="0.018"
            position="0 0.42 0"
            rotation="90 0 0"
            animation="property: rotation; to: 90 360 0; dur: 6500; loop: true; easing: linear"
          ></a-torus>

          <a-torus
            id="ring-b"
            color="#ff4f8b"
            radius="0.72"
            radius-tubular="0.012"
            position="0 0.42 0"
            rotation="35 0 60"
            animation="property: rotation; to: 395 0 60; dur: 8200; loop: true; easing: linear"
          ></a-torus>

          <a-torus
            id="ring-c"
            color="#79ffe1"
            radius="0.92"
            radius-tubular="0.006"
            position="0 0.42 0"
            rotation="68 0 122"
            material="opacity: 0.78; transparent: true"
            animation="property: rotation; to: 68 -360 122; dur: 11200; loop: true; easing: linear"
          ></a-torus>

          <a-entity id="orbit" position="0 0.42 0" animation="property: rotation; to: 0 -360 0; dur: 7600; loop: true; easing: linear">
            <a-entity mixin="seed" material="color: #ffffff; emissive: #38d5ff; emissiveIntensity: 0.35" position="0.82 0 0"></a-entity>
            <a-entity mixin="seed" material="color: #ffe66d; emissive: #ffbf47; emissiveIntensity: 0.3" position="-0.48 0 0.66"></a-entity>
            <a-entity mixin="seed" material="color: #ff7ab6; emissive: #ff4f8b; emissiveIntensity: 0.3" position="-0.34 0 -0.74"></a-entity>
          </a-entity>

          <a-entity id="petal-crown" position="0 0.44 0" animation="property: rotation; to: 0 360 0; dur: 10400; loop: true; easing: linear">
            <a-entity class="petal" mixin="petal" position="0 0.22 -0.58" rotation="58 0 0"></a-entity>
            <a-entity class="petal" mixin="petal" position="0.5 0.22 -0.29" rotation="58 -60 0"></a-entity>
            <a-entity class="petal" mixin="petal" position="0.5 0.22 0.29" rotation="58 -120 0"></a-entity>
            <a-entity class="petal" mixin="petal" position="0 0.22 0.58" rotation="58 180 0"></a-entity>
            <a-entity class="petal" mixin="petal" position="-0.5 0.22 0.29" rotation="58 120 0"></a-entity>
            <a-entity class="petal" mixin="petal" position="-0.5 0.22 -0.29" rotation="58 60 0"></a-entity>
          </a-entity>

          <a-entity id="beam-field" position="0 0.48 0" animation="property: rotation; to: 0 -360 0; dur: 13600; loop: true; easing: linear">
            <a-entity class="beam" mixin="beam" position="0.72 0 0" rotation="0 0 86"></a-entity>
            <a-entity class="beam" mixin="beam" position="-0.72 0 0" rotation="0 0 86"></a-entity>
            <a-entity class="beam" mixin="beam" position="0 0 0.72" rotation="86 0 0"></a-entity>
            <a-entity class="beam" mixin="beam" position="0 0 -0.72" rotation="86 0 0"></a-entity>
          </a-entity>

          <a-entity id="constellation-field" position="0 0.46 0"></a-entity>
          <a-entity id="lattice-field" position="0 0.46 0"></a-entity>
          <a-entity id="wave-field" position="0 0.42 0"></a-entity>
          <a-entity id="astrophage-field" position="0 0.42 0"></a-entity>

          <a-entity id="sun-drain-system" position="0 0.42 0" visible="false">
            <a-cylinder
              class="phase-beam"
              radius="0.018"
              height="1.12"
              position="0.36 0.38 0"
              rotation="0 0 72"
              material="color: #ff8a1f; emissive: #ff8a1f; emissiveIntensity: 0.8; transparent: true; opacity: 0.56"
              animation="property: scale; from: 1 0.72 1; to: 1 1.18 1; dur: 820; dir: alternate; loop: true; easing: easeInOutSine"
            ></a-cylinder>
            <a-cylinder
              class="phase-beam"
              radius="0.012"
              height="0.9"
              position="-0.34 0.26 0.18"
              rotation="32 0 -64"
              material="color: #facc15; emissive: #facc15; emissiveIntensity: 0.7; transparent: true; opacity: 0.44"
              animation="property: scale; from: 1 1.2 1; to: 1 0.7 1; dur: 760; dir: alternate; loop: true; easing: easeInOutSine"
            ></a-cylinder>
            <a-torus
              radius="0.42"
              radius-tubular="0.012"
              rotation="90 0 0"
              material="color: #7a1900; emissive: #ff4f00; emissiveIntensity: 0.68; transparent: true; opacity: 0.58"
              animation="property: scale; from: 0.8 0.8 0.8; to: 1.38 1.38 1.38; dur: 1000; dir: alternate; loop: true; easing: easeOutQuad"
            ></a-torus>
          </a-entity>

          <a-entity id="trajectory-system" position="0 0.42 0" visible="false">
            <a-cylinder
              radius="0.009"
              height="1.35"
              position="-0.46 0.38 0.08"
              rotation="74 18 -42"
              material="color: #93c5fd; emissive: #60a5fa; emissiveIntensity: 0.7; transparent: true; opacity: 0.5"
            ></a-cylinder>
            <a-sphere radius="0.046" position="-0.82 0.16 0.28" material="color: #60a5fa; emissive: #60a5fa; emissiveIntensity: 0.65"></a-sphere>
            <a-sphere radius="0.034" position="-0.3 0.54 0.06" material="color: #ffffff; emissive: #93c5fd; emissiveIntensity: 0.55"></a-sphere>
            <a-sphere radius="0.052" position="0.38 0.88 -0.18" material="color: #38bdf8; emissive: #38bdf8; emissiveIntensity: 0.7"></a-sphere>
          </a-entity>

          <a-entity id="tau-signal-system" position="0 0.72 0" visible="false">
            <a-torus radius="0.36" radius-tubular="0.006" rotation="0 90 0" material="color: #79ffe1; emissive: #79ffe1; emissiveIntensity: 0.66; transparent: true; opacity: 0.7"></a-torus>
            <a-torus radius="0.52" radius-tubular="0.005" rotation="0 90 0" material="color: #38d5ff; emissive: #38d5ff; emissiveIntensity: 0.56; transparent: true; opacity: 0.48"></a-torus>
            <a-torus radius="0.68" radius-tubular="0.004" rotation="0 90 0" material="color: #a7f3d0; emissive: #a7f3d0; emissiveIntensity: 0.5; transparent: true; opacity: 0.38"></a-torus>
            <a-box width="0.06" height="0.46" depth="0.02" position="-0.18 0 0" material="color: #79ffe1; emissive: #79ffe1; emissiveIntensity: 0.55"></a-box>
            <a-box width="0.06" height="0.72" depth="0.02" position="0 0 0" material="color: #ffffff; emissive: #38d5ff; emissiveIntensity: 0.65"></a-box>
            <a-box width="0.06" height="0.32" depth="0.02" position="0.18 0 0" material="color: #79ffe1; emissive: #79ffe1; emissiveIntensity: 0.55"></a-box>
          </a-entity>

          <a-entity id="sample-system" position="0 0.58 0" visible="false">
            <a-cylinder radius="0.09" height="0.28" material="color: #e9d5ff; emissive: #c084fc; emissiveIntensity: 0.36; metalness: 0.35; roughness: 0.18"></a-cylinder>
            <a-torus radius="0.18" radius-tubular="0.008" rotation="90 0 0" material="color: #f0abfc; emissive: #f0abfc; emissiveIntensity: 0.62; transparent: true; opacity: 0.74"></a-torus>
            <a-torus radius="0.26" radius-tubular="0.006" rotation="25 0 70" material="color: #ffffff; emissive: #c084fc; emissiveIntensity: 0.48; transparent: true; opacity: 0.52"></a-torus>
          </a-entity>

          <a-entity id="cure-system" position="0 0.42 0" visible="false">
            <a-sphere
              radius="0.82"
              material="color: #22c55e; emissive: #4ade80; emissiveIntensity: 0.18; transparent: true; opacity: 0.16; wireframe: true"
              animation="property: scale; from: 0.75 0.75 0.75; to: 1.12 1.12 1.12; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine"
            ></a-sphere>
            <a-torus radius="0.5" radius-tubular="0.012" rotation="90 0 0" material="color: #4ade80; emissive: #4ade80; emissiveIntensity: 0.72; transparent: true; opacity: 0.64"></a-torus>
            <a-torus radius="0.74" radius-tubular="0.008" rotation="38 0 0" material="color: #facc15; emissive: #facc15; emissiveIntensity: 0.5; transparent: true; opacity: 0.46"></a-torus>
          </a-entity>

          <a-entity id="mission-console" position="-0.82 0.34 0.56" rotation="66 0 -18">
            <a-box
              width="0.72"
              height="0.38"
              depth="0.018"
              material="color: #071526; emissive: #0d2d63; emissiveIntensity: 0.28; transparent: true; opacity: 0.82; metalness: 0.2; roughness: 0.24"
            ></a-box>
            <a-text
              id="console-title"
              value="HAIL MARY"
              align="center"
              color="#dbeafe"
              width="1.4"
              position="0 0.11 0.018"
            ></a-text>
            <a-text
              id="console-readout"
              value="SOL 42% | AMOSTRA 0%"
              align="center"
              color="#79ffe1"
              width="1.1"
              position="0 -0.02 0.02"
            ></a-text>
            <a-box id="console-bar" width="0.48" height="0.032" depth="0.02" position="0 -0.14 0.024" material="color: #ff8a1f; emissive: #ff8a1f; emissiveIntensity: 0.55"></a-box>
          </a-entity>

          <a-entity id="sample-lab" position="0.82 0.18 0.46" rotation="0 -24 0">
            <a-cylinder radius="0.22" height="0.045" material="color: #111827; metalness: 0.45; roughness: 0.22"></a-cylinder>
            <a-cylinder id="lab-vial" radius="0.052" height="0.34" position="0 0.2 0" material="color: #e0f2fe; emissive: #38bdf8; emissiveIntensity: 0.18; transparent: true; opacity: 0.58; metalness: 0.12; roughness: 0.1"></a-cylinder>
            <a-sphere id="lab-sample" radius="0.045" position="0 0.22 0" material="color: #ff8a1f; emissive: #ff8a1f; emissiveIntensity: 0.9"></a-sphere>
            <a-torus radius="0.16" radius-tubular="0.006" position="0 0.2 0" rotation="90 0 0" material="color: #93c5fd; emissive: #93c5fd; emissiveIntensity: 0.42; transparent: true; opacity: 0.68"></a-torus>
          </a-entity>

          <a-entity id="scanner-fan" position="0 0.08 -0.56" visible="false">
            <a-cone
              radius-bottom="0.62"
              radius-top="0.05"
              height="0.72"
              rotation="-90 0 0"
              material="color: #38bdf8; emissive: #38bdf8; emissiveIntensity: 0.22; transparent: true; opacity: 0.18; wireframe: true"
              animation="property: rotation; from: -90 -18 0; to: -90 18 0; dur: 1600; dir: alternate; loop: true; easing: easeInOutSine"
            ></a-cone>
            <a-cylinder radius="0.018" height="0.3" rotation="90 0 0" material="color: #dbeafe; emissive: #38bdf8; emissiveIntensity: 0.5"></a-cylinder>
          </a-entity>

          <a-entity id="holo-grid" position="0 0.065 0">
            <a-plane
              width="1.7"
              height="1.7"
              rotation="-90 0 0"
              material="color: #38bdf8; emissive: #38bdf8; emissiveIntensity: 0.12; transparent: true; opacity: 0.12; wireframe: true"
            ></a-plane>
            <a-cylinder radius="0.012" height="1.4" position="0 0.02 0" rotation="0 0 90" material="color: #ff4f00; emissive: #ff4f00; emissiveIntensity: 0.52; transparent: true; opacity: 0.72"></a-cylinder>
            <a-cylinder radius="0.012" height="1.4" position="0 0.024 0" rotation="90 0 0" material="color: #38bdf8; emissive: #38bdf8; emissiveIntensity: 0.52; transparent: true; opacity: 0.72"></a-cylinder>
            <a-cone radius-bottom="0.045" radius-top="0" height="0.12" position="0.74 0.02 0" rotation="0 0 -90" material="color: #ff4f00; emissive: #ff4f00; emissiveIntensity: 0.64"></a-cone>
            <a-cone radius-bottom="0.045" radius-top="0" height="0.12" position="0 0.024 -0.74" rotation="-90 0 0" material="color: #38bdf8; emissive: #38bdf8; emissiveIntensity: 0.64"></a-cone>
          </a-entity>

          <a-entity id="tech-nodes" position="0 0.18 0"></a-entity>

          <a-entity id="spark-field" position="0 0.42 0">
            <a-sphere radius="0.025" color="#79ffe1" position="0.12 0.48 -0.62"></a-sphere>
            <a-sphere radius="0.018" color="#ffffff" position="-0.68 0.18 -0.12"></a-sphere>
            <a-sphere radius="0.022" color="#ffdf75" position="0.54 0.28 0.44"></a-sphere>
            <a-sphere radius="0.016" color="#ff7ab6" position="-0.2 0.62 0.52"></a-sphere>
            <a-sphere radius="0.02" color="#38d5ff" position="0.74 0.08 -0.18"></a-sphere>
            <a-sphere radius="0.014" color="#ffffff" position="-0.12 0.84 -0.32"></a-sphere>
            <a-sphere radius="0.017" color="#79ffe1" position="0.26 0.76 0.36"></a-sphere>
          </a-entity>

          <a-cylinder
            id="base"
            radius="0.62"
            height="0.06"
            color="#13241f"
            position="0 0.03 0"
            material="opacity: 0.86; transparent: true"
          ></a-cylinder>

          <a-text
            id="caption"
            value="toque no nucleo"
            align="center"
            color="#ffffff"
            width="2.4"
            position="0 0.08 0.78"
            rotation="70 0 0"
          ></a-text>
        </a-entity>
      </a-marker>

      <a-entity
        camera
        cursor="fuse: false; rayOrigin: mouse"
        raycaster="objects: .interactive; far: 20"
      ></a-entity>
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
